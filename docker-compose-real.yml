version: "3.7"
services:
  tortoisebot-ros2-real:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.tortoisebot-ros2
    image: chatzialex/cp22:tortoisebot-ros2
    container_name: tortoisebot-ros2-real_1
    command: "source /ros2_ws/install/setup.bash && ros2 launch tortoisebot_bringup bringup.launch.py use_sim_time:=False"
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    networks:
      - ros2-network
  tortoisebot-ros2-slam:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.tortoisebot-ros2-slam
    image: chatzialex/cp22:tortoisebot-ros2-slam
    container_name: tortoisebot-ros2-slam_1
    command: "source /ros2_ws/install/setup.bash && ros2 launch tortoisebot_slam cartographer.launch.py use_sim_time:=False"
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    networks:
      - ros2-network

networks:
  ros2-network: